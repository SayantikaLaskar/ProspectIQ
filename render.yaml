# Render blueprint for the Prospect IQ backend (free Docker web service).
# New → Blueprint → pick this repo → set HF_API_TOKEN → Apply.
services:
  - type: web
    name: prospectiq-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: LLM_PROVIDER
        value: huggingface
      - key: HF_MODEL
        value: meta-llama/Llama-3.1-8B-Instruct
      - key: CORS_ORIGINS
        value: "*"
      - key: HF_API_TOKEN
        sync: false   # set this as a secret in the Render dashboard
