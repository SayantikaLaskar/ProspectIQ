name: keep-warm
# Pings the Render backend every ~12 min so the free tier doesn't spin down.
# (Free-tier services sleep after ~15 min idle; this keeps the demo instant.)
on:
  schedule:
    - cron: '*/12 * * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: ping health
        run: curl -sS -m 60 https://prospectiq-api.onrender.com/api/health || true
